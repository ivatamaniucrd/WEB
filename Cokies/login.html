<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autentificare</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <div class="page-shell">
    <header class="topbar glass">
      <div class="brand-wrap">
        <div class="brand-dot"></div>
        <span class="brand">Autentificare</span>
      </div>
      <nav>
    <ul class="nav-links">
        <li><a href="index.html">Acasă</a></li>
        <li><a href="preferences.html">Preferințe</a></li>
        <li><a href="cookies-info.html">Cookies Info</a></li>
        
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="cart.html">Coș</a></li>
        <li><a href="login.html">Autentificare</a></li>
    </ul>

    <div class="theme-switch-wrapper">
        <label for="theme-toggle" style="margin-bottom: 0; font-size: 0.85rem; font-weight: 600; cursor: pointer;">Dark Mode</label>
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
    </div>
</nav>
    </header>

    <main class="container auth-layout">
      <section class="card auth-card">
        <h1>Intră în cont</h1>
        <p class="muted">Folosește unul dintre conturile demo sau creează unul nou.</p>

        <div class="demo-box">
          <p><strong>Utilizatori test:</strong></p>
          <p>admin / password</p>
          <p>student / student123</p>
        </div>

        <div id="loginAlert"></div>

        <form id="loginForm" class="form-grid">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" name="loginUsername" required />
          </div>

          <div class="form-group">
            <label for="loginPassword">Parolă</label>
            <input type="password" id="loginPassword" name="loginPassword" required />
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Ține-mă minte</label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Autentificare</button>
          </div>
        </form>

        <p class="auth-link">Nu ai cont? <a href="register.html">Înregistrează-te</a></p>
      </section>
    </main>
  </div>

  <script src="js/cookies.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
