<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - Laborator 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h1 class="text-center">Creare Cont</h1>
        
        <div id="alert-box" class="alert hidden"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">Nume utilizator (min. 3 caractere)</label>
                <input type="text" id="reg-username" required minlength="3">
            </div>
            
            <div class="form-group">
                <label for="reg-email">Adresă Email</label>
                <input type="email" id="reg-email" required>
            </div>
            
            <div class="form-group">
                <label for="reg-password">Parolă (min. 6 caractere)</label>
                <input type="password" id="reg-password" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="reg-confirm">Confirmare Parolă</label>
                <input type="password" id="reg-confirm" required>
            </div>
            
            <div class="text-center mt-m">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Înregistrează-te</button>
            </div>
        </form>
        
        <div class="text-center mt-m">
            <p>Ai deja cont? <a href="login.html" style="color: var(--accent-color); font-weight: 600;">Autentifică-te</a></p>
        </div>
    </div>

    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
